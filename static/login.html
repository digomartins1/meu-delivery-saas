<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Delivery Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
        <h1 class="text-2xl font-black text-orange-600 mb-6 uppercase tracking-tighter">Acesso Restrito</h1>
        <div class="space-y-4">
            <input type="text" id="user" placeholder="Usuário" class="w-full border-2 p-3 rounded-lg outline-orange-500">
            <input type="password" id="pass" placeholder="Senha" class="w-full border-2 p-3 rounded-lg outline-orange-500">
            <button onclick="entrar()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-lg shadow-lg active:scale-95 transition">Entrar no Painel</button>
        </div>
        <p id="erro" class="text-red-500 text-sm mt-4 hidden italic">Usuário ou senha incorretos!</p>
    </div>

    <script>
        async function entrar() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: user, password: pass})
            });

            if (res.ok) {
                const data = await res.json();
                // SALVA A SESSÃO NO CELULAR
                localStorage.setItem('loja_id', data.store_id);
                localStorage.setItem('usuario', data.username);
                window.location.href = 'admin.html';
            } else {
                document.getElementById('erro').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
