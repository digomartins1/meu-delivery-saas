<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center mb-6">Painel Admin</h1>
        <input type="text" id="u" placeholder="Usuário" class="w-full border p-3 rounded mb-4">
        <input type="password" id="p" placeholder="Senha" class="w-full border p-3 rounded mb-6">
        <button onclick="login()" class="w-full bg-orange-600 text-white py-3 rounded-lg font-bold">Entrar</button>
    </div>
    <script>
        async function login() {
            const res = await fetch('/api/login', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({username:u.value, password:p.value})
            });
            if(res.ok){
                const d = await res.json();
                localStorage.setItem('loja_id', d.store_id);
                localStorage.setItem('user', d.username);
                location.href='admin.html';
            } else { alert("Erro!"); }
        }
    </script>
</body>
</html>
