<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center mb-6 text-orange-600 italic">ADMIN LOGIN</h1>
        <div class="space-y-4">
            <input type="text" id="usuario" placeholder="Usuário" class="w-full border-2 p-3 rounded-lg outline-orange-500 text-black">
            <input type="password" id="senha" placeholder="Senha" class="w-full border-2 p-3 rounded-lg outline-orange-500 text-black">
            <button onclick="fazerLogin()" class="w-full bg-orange-600 text-white font-bold py-3 rounded-lg">ENTRAR</button>
        </div>
    </div>
    <script>
        async function fazerLogin() {
            const u = document.getElementById('usuario').value;
            const s = document.getElementById('senha').value;

            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: u, password: s})
            });

            if (res.ok) {
                const d = await res.json();
                localStorage.setItem('loja_id', d.store_id);
                localStorage.setItem('usuario', d.username);
                window.location.href = 'admin.html';
            } else {
                alert("Usuário ou senha incorretos!");
            }
        }
    </script>
</body>
</html>
