<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title><script src="https://cdn.tailwindcss.com"></script>
    <style>.view { display: none; } .view.active { display: block; }</style>
</head>
<body class="bg-gray-50 pb-28">
    <div id="btn-rastrear" onclick="toggleT('s')" class="hidden fixed top-4 right-4 bg-orange-600 text-white px-5 py-2 rounded-full shadow-2xl z-50 animate-pulse text-[10px] font-bold border-2 border-white uppercase">📍 Rastrear</div>

    <div id="v-menu" class="view active">
        <header class="bg-orange-600 text-white p-10 text-center shadow-lg mb-6">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Delivery Jotta</h1>
        </header>
        <main id="menu" class="p-4 max-w-md mx-auto space-y-6"></main>
        <div id="cart" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t hidden flex justify-between items-center shadow-2xl rounded-t-[2.5rem] z-40">
            <div>
                <p class="text-[10px] text-gray-400 font-bold uppercase">Total</p>
                <b id="tot" class="text-2xl text-orange-600 font-black leading-none">R$ 0,00</b>
            </div>
            <button onclick="enviar()" class="bg-green-600 text-white px-10 py-3 rounded-full font-black text-lg active:scale-95 transition shadow-lg">PEDIR</button>
        </div>
    </div>

    <div id="v-status" class="view fixed inset-0 bg-white z-[60] flex flex-col items-center justify-center p-10 text-center">
        <div class="text-7xl mb-6 animate-bounce">🛵</div>
        <h2 class="text-2xl font-bold text-slate-800 mb-2">Acompanhe seu Pedido</h2>
        <div class="bg-orange-50 w-full p-10 rounded-[2.5rem] border-2 border-orange-100 mb-10 shadow-inner">
            <p class="text-[10px] font-black text-orange-400 mb-2 uppercase tracking-widest">Status Atual</p>
            <p id="st-txt" class="text-4xl font-black text-orange-600 uppercase tracking-tighter leading-none">Pendente</p>
        </div>
        <button onclick="toggleT('m')" class="text-gray-400 underline text-sm font-bold uppercase tracking-widest">Voltar ao Cardápio</button>
    </div>

    <script>
        const sId = 1; const WA = "5511999999999"; 
        let total = 0; let itens = [];

        async function load(){
            const res = await fetch(`/api/products/${sId}`);
            const data = await res.json();
            const cats = {};
            data.forEach(p=>{ if(!cats[p.category]) cats[p.category]=[]; cats[p.category].push(p); });
            let h = "";
            for(let c in cats){
                h += `<h2 class="text-orange-600 font-bold text-[10px] uppercase mb-4 mt-8 tracking-[0.2em] border-b border-orange-100 pb-1">${c}</h2>`;
                h += cats[c].map(p=>`
                <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center mb-4 border border-gray-100">
                    <img src="${p.image_url||'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-xl object-cover mr-4 bg-gray-50">
                    <div class="flex-1">
                        <h3 class="font-bold text-gray-800 text-sm leading-tight">${p.name}</h3>
                        <p class="text-[10px] text-gray-400 line-clamp-2 mt-0.5">${p.description || ''}</p>
                        <p class="text-orange-600 font-black text-sm mt-1">R$ ${p.price.toFixed(2)}</p>
                    </div>
                    <button onclick="add('${p.name}',${p.price})" class="bg-orange-600 text-white w-10 h-10 rounded-full font-bold text-2xl shadow-lg active:scale-90 transition">+</button>
                </div>`).join('');
            }
            document.getElementById('menu').innerHTML = h || '<p class="text-center py-20 text-gray-300">Nenhum item cadastrado.</p>';
            checkP();
        }

        function add(n,p){
            total+=p; itens.push(n);
            document.getElementById('tot').innerText=`R$ ${total.toFixed(2)}`;
            document.getElementById('cart').classList.remove('hidden');
        }

        async function enviar(){
            const cli = prompt("Qual seu nome?"); if(!cli) return;
            const res = await fetch(`/order/${sId}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cliente:cli, total:total.toFixed(2), itens:itens.join(", ")})});
            const d = await res.json(); 
            localStorage.setItem('pid', d.order_id);
            const textoZap = `*NOVO PEDIDO - DELIVERY JOTTA*\n*Cliente:* ${cli}\n*Itens:* ${itens.join(", ")}\n*Total:* R$ ${total.toFixed(2)}`;
            window.open(`https://wa.me/${WA}?text=${encodeURIComponent(textoZap)}`);
            location.reload();
        }

        async function checkP(){
            const id = localStorage.getItem('pid'); if(!id) return;
            const res = await fetch(`/api/order-status/${id}`);
            if(res.ok){
                const d = await res.json();
                if(d.status !== 'Concluído'){
                    document.getElementById('st-txt').innerText=d.status;
                    document.getElementById('btn-rastrear').classList.remove('hidden');
                    const ws = new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/${sId}`);
                    ws.onmessage=(e)=>{ 
                        const m=JSON.parse(e.data); 
                        if(m.id==id){ 
                            document.getElementById('st-txt').innerText=m.status; 
                            if(m.status==='Concluído'){localStorage.removeItem('pid');location.reload();}
                        }
                    };
                }
            }
        }

        function toggleT(v){ 
            document.getElementById('v-menu').classList.toggle('active', v==='m'); 
            document.getElementById('v-status').classList.toggle('active', v==='s'); 
        }
        load();
    </script>
</body>
</html>
