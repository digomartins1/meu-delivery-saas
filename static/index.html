<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view { display: none; }
        .view.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 pb-28">

    <!-- BOTÃO DE RASTREIO (Sempre visível se houver pedido) -->
    <div id="btn-rastrear" onclick="alternarTela('status')" class="hidden fixed top-4 right-4 bg-orange-600 text-white px-5 py-2 rounded-full shadow-2xl z-50 animate-pulse text-xs font-bold border-2 border-white">
        📍 ACOMPANHAR PEDIDO
    </div>

    <!-- TELA 1: CARDÁPIO -->
    <div id="view-menu" class="view active">
        <header class="bg-orange-600 text-white p-8 text-center shadow-lg mb-6">
            <h1 class="text-3xl font-black italic uppercase tracking-tighter">Delivery Jotta</h1>
        </header>
        <main id="menu" class="p-4 max-w-md mx-auto space-y-4"></main>
        
        <div id="cart" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t hidden flex justify-between items-center shadow-2xl rounded-t-3xl z-40">
            <b id="tot" class="text-2xl text-orange-600 font-black">R$ 0,00</b>
            <button onclick="enviarPedido()" class="bg-green-600 text-white px-10 py-3 rounded-full font-black uppercase shadow-lg">Pedir Agora</button>
        </div>
    </div>

    <!-- TELA 2: STATUS DO PEDIDO -->
    <div id="view-status" class="view fixed inset-0 bg-white z-[60] p-10 text-center">
        <div class="flex flex-col items-center justify-center h-full">
            <div class="text-7xl mb-6">🛵</div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Seu Pedido</h2>
            <p id="msg-cliente" class="text-slate-400 mb-8 italic text-sm">Estamos preparando tudo com carinho!</p>
            
            <div class="bg-orange-50 w-full p-8 rounded-[2rem] border-2 border-orange-100 mb-10 shadow-inner">
                <p class="text-[10px] font-black text-orange-400 mb-2 uppercase tracking-widest">Status Atual</p>
                <p id="order-status-txt" class="text-3xl font-black text-orange-600 uppercase tracking-tighter leading-none">Pendente</p>
            </div>

            <button onclick="alternarTela('menu')" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest">Voltar ao Cardápio</button>
        </div>
    </div>

    <script>
        const sId = 1; 
        const WHATSAPP = "5511999999999"; // Troque pelo seu número
        let total = 0; let itens = [];

        // --- FUNÇÃO 1: VERIFICAR SE JÁ TEM PEDIDO SALVO ---
        async function verificarStatus() {
            const pedidoId = localStorage.getItem('meu_pedido_id');
            if (!pedidoId) return;

            try {
                const res = await fetch(`/api/order-status/${pedidoId}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.status !== 'Concluído') {
                        document.getElementById('order-status-txt').innerText = data.status;
                        document.getElementById('btn-rastrear').classList.remove('hidden');
                        document.getElementById('msg-cliente').innerText = `${data.cliente}, seu pedido está:`;
                        conectarWS(pedidoId);
                        
                        // Se não for "Pendente", foca direto no status
                        if(data.status !== 'Pendente') alternarTela('status');
                    } else {
                        localStorage.removeItem('meu_pedido_id');
                    }
                }
            } catch (e) { console.error("Erro na persistência"); }
        }

        // --- FUNÇÃO 2: CARREGAR PRODUTOS ---
        async function carregarMenu() {
            const res = await fetch(`/api/products/${sId}`);
            const data = await res.json();
            const cats = {};
            data.forEach(p => { if(!cats[p.category]) cats[p.category]=[]; cats[p.category].push(p); });
            
            let html = "";
            for(let c in cats) {
                html += `<h2 class="text-orange-600 font-black text-xs uppercase tracking-[0.2em] mb-4 mt-8">${c}</h2>`;
                html += cats[c].map(p => `
                    <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center mb-3 border border-gray-100">
                        <img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-xl object-cover mr-4">
                        <div class="flex-1"><h3 class="font-bold text-gray-800 text-sm">${p.name}</h3><p class="text-orange-600 font-bold text-sm text-sm">R$ ${p.price.toFixed(2)}</p></div>
                        <button onclick="adicionar('${p.name}', ${p.price})" class="bg-orange-600 text-white w-10 h-10 rounded-full font-bold shadow-lg">+</button>
                    </div>`).join('');
            }
            document.getElementById('menu').innerHTML = html || '<p class="text-center text-gray-300 py-10 text-sm">Nenhum produto disponível.</p>';
        }

        function adicionar(n, p) {
            total += p; itens.push(n);
            document.getElementById('tot').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('cart').classList.remove('hidden');
        }

        async function enviarPedido() {
            const nome = prompt("Qual o seu nome?");
            if (!nome) return;

            const res = await fetch(`/order/${sId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({cliente: nome, total: total.toFixed(2), itens: itens.join(", ")})
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('meu_pedido_id', data.order_id);
                
                const textoZap = `*NOVO PEDIDO*\n*Cliente:* ${nome}\n*Itens:* ${itens.join(", ")}\n*Total:* R$ ${total.toFixed(2)}`;
                window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(textoZap)}`);
                
                location.reload(); // Reinicia para ativar o modo de rastreio
            }
        }

        // --- FUNÇÃO 3: CONTROLE DE TELAS E WEBSOCKET ---
        function alternarTela(tela) {
            if (tela === 'status') {
                document.getElementById('view-menu').classList.remove('active');
                document.getElementById('view-status').classList.add('active');
                document.getElementById('btn-rastrear').classList.add('hidden');
            } else {
                document.getElementById('view-status').classList.remove('active');
                document.getElementById('view-menu').classList.add('active');
                document.getElementById('btn-rastrear').classList.remove('hidden');
            }
        }

        function conectarWS(pedidoId) {
            const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${window.location.host}/ws/${sId}`);
            
            ws.onmessage = (e) => {
                const update = JSON.parse(e.data);
                if (update.id == pedidoId) {
                    document.getElementById('order-status-txt').innerText = update.status;
                    
                    if (update.status === 'Concluído') {
                        localStorage.removeItem('meu_pedido_id');
                        alert("Pedido entregue! Bom apetite.");
                        location.reload();
                    }
                }
            };
        }

        // Inicialização
        window.onload = () => {
            verificarStatus();
            carregarMenu();
        };
    </script>
</body>
</html>
