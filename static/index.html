<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-28">
    <header class="bg-orange-600 text-white p-8 text-center shadow-lg">
        <h1 class="text-3xl font-black italic tracking-tighter">DELIVERY JOTTA</h1>
        <p class="text-xs opacity-80 uppercase font-bold tracking-widest mt-1">Peça agora pelo WhatsApp</p>
    </header>
    
    <main id="menu" class="p-4 max-w-md mx-auto"></main>

    <div id="cart" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t hidden flex justify-between items-center shadow-[0_-10px_20px_rgba(0,0,0,0.1)] rounded-t-3xl">
        <div>
            <p class="text-[10px] text-gray-400 font-bold uppercase">Total do Pedido</p>
            <b id="tot" class="text-2xl text-orange-600 font-black">R$ 0,00</b>
        </div>
        <button onclick="send()" class="bg-green-600 text-white px-10 py-3 rounded-full font-black text-lg active:scale-90 transition">FINALIZAR</button>
    </div>

    <script>
        const sId = 1; 
        const WHATSAPP_NUMBER = "5582998095090"; // COLOQUE SEU NUMERO AQUI (Com 55 + DDD)
        let total = 0; let itens = [];

        async function load(){
            const res = await fetch(`/api/products/${sId}`);
            const data = await res.json();
            
            // Agrupar produtos por categoria
            const cats = {};
            data.forEach(p => {
                if(!cats[p.category]) cats[p.category] = [];
                cats[p.category].push(p);
            });

            let html = "";
            for(let cat in cats) {
                html += `<h2 class="text-orange-600 font-black text-xl mt-8 mb-4 border-b-2 border-orange-100 uppercase tracking-tighter">${cat}</h2>`;
                html += cats[cat].map(p=>`
                    <div class="bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center mb-3 border border-gray-100">
                        <div><h3 class="font-bold text-gray-800">${p.name}</h3><p class="text-gray-400 text-sm font-bold">R$ ${p.price.toFixed(2)}</p></div>
                        <button onclick="add('${p.name}', ${p.price})" class="bg-orange-600 text-white w-10 h-10 rounded-full font-bold text-2xl shadow-lg shadow-orange-200">+</button>
                    </div>`).join('');
            }
            document.getElementById('menu').innerHTML = html;
        }

        function add(n,p){
            total+=p; itens.push(n);
            document.getElementById('tot').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('cart').classList.remove('hidden');
        }

        async function send(){
            const cli = prompt("Qual o seu nome?"); 
            if(!cli) return;

            // 1. Enviar para o Painel Admin (WebSocket)
            const pedidoObj = {cliente:cli, total:total.toFixed(2), itens:itens.join(", ")};
            await fetch(`/order/${sId}`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify(pedidoObj)
            });

            // 2. Criar mensagem para WhatsApp
            let msg = `*NOVO PEDIDO - DELIVERY JOTTA*\n`;
            msg += `------------------------------\n`;
            msg += `*Cliente:* ${cli}\n`;
            msg += `*Itens:* \n - ${itens.join("\n - ")}\n`;
            msg += `------------------------------\n`;
            msg += `*TOTAL: R$ ${total.toFixed(2)}*`;

            const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
            
            alert("Pedido enviado para o painel! Agora, confirme no WhatsApp.");
            window.open(url, "_blank");
            location.reload();
        }
        load();
    </script>
</body>
</html>
