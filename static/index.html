<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title><script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view { display: none; }
        .view.active { display: block; }
        .view-flex { display: none; }
        .view-flex.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 pb-28">

    <!-- BOTÃO FLUTUANTE DE RASTREIO -->
    <div id="btn-rastrear" onclick="mostrarStatus()" class="hidden fixed top-4 right-4 bg-orange-600 text-white px-4 py-2 rounded-full shadow-2xl z-50 animate-pulse text-xs font-bold border-2 border-white">
        📍 ACOMPANHAR PEDIDO
    </div>

    <!-- VISÃO DO CARDÁPIO -->
    <div id="view-menu" class="view active">
        <header class="bg-orange-600 text-white p-8 text-center shadow-lg">
            <h1 class="text-3xl font-black italic uppercase">Delivery Jotta</h1>
        </header>
        <main id="menu" class="p-4 max-w-md mx-auto"></main>
        <div id="cart" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t hidden flex justify-between items-center shadow-2xl rounded-t-3xl z-40">
            <b id="tot" class="text-2xl text-orange-600 font-black">R$ 0,00</b>
            <button onclick="send()" class="bg-green-600 text-white px-10 py-3 rounded-full font-black">PEDIR AGORA</button>
        </div>
    </div>

    <!-- VISÃO DE STATUS -->
    <div id="view-status" class="view-flex fixed inset-0 bg-white flex-col items-center justify-center p-10 text-center z-[60]">
        <div class="text-6xl mb-6 animate-bounce text-orange-500">🛵</div>
        <h2 class="text-2xl font-bold mb-2 text-slate-800">Seu Pedido</h2>
        <div class="bg-orange-50 w-full p-8 rounded-3xl border-2 border-orange-100 my-6">
            <p class="text-[10px] font-black text-orange-400 mb-1 uppercase tracking-widest">Status Atual</p>
            <p id="order-status" class="text-3xl font-black text-orange-600 uppercase">Aguardando...</p>
        </div>
        <button onclick="fecharStatus()" class="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-bold text-xs uppercase">Voltar ao Cardápio</button>
    </div>

    <script>
        const sId = 1; 
        const WHATSAPP = "5582998095090"; 
        let total = 0; let itens = [];

        // --- 1. TRAVA DE PERSISTÊNCIA (Roda assim que abre) ---
        async function verificarPersistencia() {
            const pedidoId = localStorage.getItem('meu_pedido_id');
            if (!pedidoId) return;

            try {
                const res = await fetch(`/api/order-status/${pedidoId}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.status !== 'Concluído') {
                        document.getElementById('order-status').innerText = data.status;
                        document.getElementById('btn-rastrear').classList.remove('hidden');
                        conectarWS(pedidoId);
                        // Se o status for novo, mostra logo a tela de status
                        if(data.status !== 'Pendente') mostrarStatus();
                    } else {
                        localStorage.removeItem('meu_pedido_id');
                    }
                } else {
                    localStorage.removeItem('meu_pedido_id');
                }
            } catch (e) { console.log("Erro ao checar pedido"); }
        }

        // --- 2. LÓGICA DO CARDÁPIO ---
        async function loadMenu(){
            const res = await fetch(`/api/products/${sId}`);
            const data = await res.json();
            const cats = {};
            data.forEach(p => { if(!cats[p.category]) cats[p.category]=[]; cats[p.category].push(p); });
            let h = "";
            for(let c in cats){
                h += `<h2 class="text-orange-600 font-bold mt-8 mb-4 border-b border-orange-100 uppercase text-xs tracking-widest">${c}</h2>`;
                h += cats[c].map(p=>`
                    <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center mb-3 border border-gray-100">
                        <img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-xl object-cover mr-4">
                        <div class="flex-1"><h3 class="font-bold text-gray-800 text-sm">${p.name}</h3><p class="text-orange-600 font-bold text-sm">R$ ${p.price.toFixed(2)}</p></div>
                        <button onclick="add('${p.name}', ${p.price})" class="bg-orange-600 text-white w-8 h-8 rounded-full font-bold">+</button>
                    </div>`).join('');
            }
            document.getElementById('menu').innerHTML = h || '<p class="text-center py-20">Cardápio vazio.</p>';
        }

        function add(n,p){
            total+=p; itens.push(n);
            document.getElementById('tot').innerText=`R$ ${total.toFixed(2)}`;
            document.getElementById('cart').classList.remove('hidden');
        }

        async function send(){
            const cli = prompt("Qual o seu nome?"); if(!cli) return;
            const res = await fetch(`/order/${sId}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({cliente:cli, total:total.toFixed(2), itens:itens.join(", ")}) });
            const data = await res.json();
            
            localStorage.setItem('meu_pedido_id', data.order_id);
            
            const msg = `*PEDIDO:* ${itens.join(", ")}\n*TOTAL:* R$ ${total.toFixed(2)}\n*CLIENTE:* ${cli}`;
            window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`);
            
            location.reload(); // Recarrega para ativar a persistência
        }

        // --- 3. CONTROLE DE TELAS E WS ---
        function conectarWS(id) {
            const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            const ws = new WebSocket(`${protocol}://${window.location.host}/ws/${sId}`);
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                if(d.id == id) {
                    document.getElementById('order-status').innerText = d.status;
                    if(d.status === 'Concluído') {
                        localStorage.removeItem('meu_pedido_id');
                        alert("Pedido Finalizado! Obrigado.");
                        location.reload();
                    }
                }
            };
        }

        function mostrarStatus() {
            document.getElementById('view-menu').classList.remove('active');
            document.getElementById('view-status').classList.add('active');
            document.getElementById('btn-rastrear').classList.add('hidden');
        }

        function fecharStatus() {
            document.getElementById('view-status').classList.remove('active');
            document.getElementById('view-menu').classList.add('active');
            document.getElementById('btn-rastrear').classList.remove('hidden');
        }

        // Inicialização
        verificarPersistencia();
        loadMenu();
    </script>
</body>
</html>
