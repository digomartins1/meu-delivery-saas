<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Jotta - Cardápio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view { display: none; }
        .view.active { display: block; }
        #v-status.active { display: flex !important; }
        #v-fidelidade.active { display: block !important; }
        .stamp { width: 45px; height: 45px; border-radius: 50%; border: 2px dashed #ddd; display: flex; align-items: center; justify-center; font-size: 20px; background: #f9f9f9; }
        .stamp.active { border-style: solid; border-color: #f97316; background: #fff7ed; color: #f97316; box-shadow: 0 4px 10px rgba(249, 115, 22, 0.2); }
    </style>
</head>
<body class="bg-gray-50 pb-32">

    <!-- OVERLAY LOJA FECHADA -->
    <div id="ov-fechado" class="hidden fixed inset-0 bg-slate-900/95 z-[100] flex flex-col items-center justify-center p-10 text-center text-white">
        <div class="text-7xl mb-4">😴</div><h2 class="text-2xl font-black uppercase">Loja Fechada</h2>
        <p class="text-slate-400 mt-2">Voltaremos em breve!</p>
    </div>

    <!-- BOTÃO RASTREAR -->
    <div id="btn-rastrear" onclick="toggleT('s')" class="hidden fixed top-4 right-4 bg-orange-600 text-white px-5 py-2 rounded-full shadow-2xl z-50 animate-pulse text-[10px] font-black border-2 border-white uppercase">📍 Rastrear Pedido</div>

    <!-- ABA 1: CARDÁPIO -->
    <div id="v-menu" class="view active">
        <header class="bg-orange-600 text-white p-10 text-center shadow-lg mb-6">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Delivery Jotta</h1>
            <p class="text-[10px] font-bold opacity-70 uppercase tracking-widest mt-1">O sabor que você merece</p>
        </header>
        <main id="menu" class="p-4 max-w-md mx-auto space-y-6"></main>
        
        <div id="cart" class="fixed bottom-20 left-0 right-0 bg-white p-4 border-t hidden flex justify-between items-center shadow-2xl rounded-t-[2rem] z-40">
            <div><p class="text-[10px] text-gray-400 font-bold uppercase">Total</p><b id="tot" class="text-2xl text-orange-600 font-black">R$ 0,00</b></div>
            <button onclick="enviarPedido()" class="bg-green-600 text-white px-10 py-4 rounded-full font-black shadow-lg active:scale-90 transition">PEDIR AGORA</button>
        </div>
    </div>

    <!-- ABA 2: FIDELIDADE -->
    <div id="v-fidelidade" class="view fixed inset-0 bg-white z-[60] p-6 overflow-y-auto">
        <h2 class="text-2xl font-black text-center mt-10 mb-2">Cartão Fidelidade</h2>
        <p class="text-center text-gray-500 text-xs mb-8">Junte 10 carimbos e ganhe 1 lanche grátis!</p>
        
        <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl border border-orange-100 mb-8 max-w-sm mx-auto">
            <div id="grid-stamps" class="grid grid-cols-5 gap-3 mb-6">
                <!-- Stamps via JS -->
            </div>
            <p id="loyalty-msg" class="text-center font-bold text-orange-600 text-sm italic">Digite seu WhatsApp abaixo</p>
        </div>

        <div class="max-w-sm mx-auto space-y-4">
            <input id="user-phone" type="tel" placeholder="Seu WhatsApp (com DDD)" class="w-full p-4 rounded-2xl border-2 border-orange-50 outline-none focus:border-orange-500 bg-gray-50 text-center font-bold">
            <button onclick="checkLoyalty()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg uppercase tracking-widest">Ver Meus Pontos</button>
        </div>
    </div>

    <!-- ABA 3: STATUS PEDIDO -->
    <div id="v-status" class="view fixed inset-0 bg-white z-[80] flex-col items-center justify-center p-10 text-center">
        <div class="text-7xl mb-6 animate-bounce">🛵</div>
        <h2 class="text-2xl font-bold mb-10">Acompanhe seu Pedido</h2>
        <div class="bg-orange-50 w-full p-10 rounded-[2.5rem] border-2 border-orange-100 mb-10 shadow-inner">
            <p class="text-[10px] font-black text-orange-400 mb-2 uppercase">Status Atual</p>
            <p id="st-txt" class="text-4xl font-black text-orange-600 uppercase">Pendente</p>
        </div>
        <button onclick="toggleT('m')" class="text-gray-400 underline text-sm uppercase font-bold">Voltar ao Menu</button>
    </div>

    <!-- MENU INFERIOR -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 z-[90] shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
        <button onclick="toggleT('m')" id="nav-m" class="flex flex-col items-center text-[10px] font-bold text-orange-600">
            <span class="text-xl">🍔</span> MENU
        </button>
        <button onclick="toggleT('f')" id="nav-f" class="flex flex-col items-center text-[10px] font-bold text-gray-400">
            <span class="text-xl">⭐</span> FIDELIDADE
        </button>
    </nav>

    <script>
        const sId = 1; 
        const WA_NUMBER = "5511999999999"; // Troque pelo seu Zap
        let total = 0; let itens = [];

        async function loadMenu(){
            const res = await fetch(`/api/products/${sId}`);
            const data = await res.json();
            const cats = {};
            data.forEach(p => { if(!cats[p.category]) cats[p.category]=[]; cats[p.category].push(p); });
            let h = "";
            for(let c in cats){
                h += `<h2 class="text-orange-600 font-black text-[10px] uppercase mb-4 mt-8 tracking-widest border-b border-orange-100 pb-1">${c}</h2>`;
                h += cats[c].map(p=>`
                    <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center mb-4 border border-gray-100">
                        <img src="${p.image_url || 'https://via.placeholder.com/150'}" class="w-16 h-16 rounded-xl object-cover mr-4">
                        <div class="flex-1"><h3 class="font-bold text-gray-800 text-sm">${p.name}</h3><p class="text-orange-600 font-black text-sm">R$ ${p.price.toFixed(2)}</p></div>
                        <button onclick="add('${p.name}', ${p.price})" class="bg-orange-600 text-white w-10 h-10 rounded-full font-bold text-2xl shadow-lg active:scale-90 transition">+</button>
                    </div>`).join('');
            }
            document.getElementById('menu').innerHTML = h || '<p class="text-center py-20 text-gray-300">Nenhum item disponível.</p>';
        }

        function add(n,p){ total+=p; itens.push(n); document.getElementById('tot').innerText=`R$ ${total.toFixed(2)}`; document.getElementById('cart').classList.remove('hidden'); }

        async function enviarPedido(){
            const cli = prompt("Qual o seu nome?"); 
            const tel = localStorage.getItem('user_phone') || prompt("Seu WhatsApp (com DDD)?");
            if(!cli || !tel) return;
            localStorage.setItem('user_phone', tel);

            const res = await fetch(`/order/${sId}`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({cliente:cli, phone: tel, total:total.toFixed(2), itens:itens.join(", ")})
            });
            const d = await res.json();
            localStorage.setItem('pid', d.order_id);
            window.open(`https://wa.me/${WA_NUMBER}?text=Pedido de ${cli}: ${itens.join(", ")}`);
            location.reload();
        }

        async function checkLoyalty() {
            const phone = document.getElementById('user-phone').value;
            if(!phone) return alert("Digite seu telefone");
            const res = await fetch(`/api/loyalty/${sId}/${phone}`);
            const data = await res.json();
            
            let html = "";
            for(let i=1; i<=10; i++) {
                const active = i <= data.stamps ? 'active' : '';
                html += `<div class="stamp ${active} flex items-center justify-center">${i <= data.stamps ? '🔥' : i}</div>`;
            }
            document.getElementById('grid-stamps').innerHTML = html;
            document.getElementById('loyalty-msg').innerText = data.stamps >= 10 ? "PARABÉNS! VOCÊ GANHOU UM LANCHE!" : `Faltam ${10 - data.stamps} pedidos para o prêmio!`;
            localStorage.setItem('user_phone', phone);
        }

        async function checkStatus(){
            const rL = await fetch(`/api/store-status/${sId}`);
            const dL = await rL.json();
            document.getElementById('ov-fechado').classList.toggle('hidden', dL.is_open);

            const id = localStorage.getItem('pid');
            if(!id) return;
            const res = await fetch(`/api/order-status/${id}`);
            if(res.ok){
                const d = await res.json();
                if(d.status !== 'Concluído'){
                    document.getElementById('st-txt').innerText = d.status;
                    document.getElementById('btn-rastrear').classList.remove('hidden');
                    conectarWS(id);
                } else { localStorage.removeItem('pid'); }
            }
        }

        function conectarWS(id){
            const ws = new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/${sId}`);
            ws.onmessage = (e) => {
                const d = JSON.parse(e.data);
                if(d.id == id){
                    document.getElementById('st-txt').innerText = d.status;
                    if(d.status === 'Concluído'){ localStorage.removeItem('pid'); alert("Pedido Finalizado!"); location.reload(); }
                }
                if(d.type === 'store_status') document.getElementById('ov-fechado').classList.toggle('hidden', d.is_open);
            };
        }

        function toggleT(v){
            document.getElementById('v-menu').classList.toggle('active', v==='m');
            document.getElementById('v-fidelidade').classList.toggle('active', v==='f');
            document.getElementById('v-status').classList.toggle('active', v==='s');
            
            document.getElementById('nav-m').classList.toggle('text-orange-600', v==='m');
            document.getElementById('nav-m').classList.toggle('text-gray-400', v!=='m');
            document.getElementById('nav-f').classList.toggle('text-orange-600', v==='f');
            document.getElementById('nav-f').classList.toggle('text-gray-400', v!=='f');
        }

        window.onload = () => { 
            loadMenu(); 
            checkStatus(); 
            const savedPhone = localStorage.getItem('user_phone');
            if(savedPhone) document.getElementById('user-phone').value = savedPhone;
        };
    </script>
</body>
</html>
