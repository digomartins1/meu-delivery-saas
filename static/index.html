<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-24">
    <nav class="bg-orange-600 text-white p-4 shadow-md text-center">
        <h1 class="text-xl font-bold">Lanchonete Express</h1>
        <p class="text-xs opacity-80">Peça agora e receba em casa</p>
    </nav>

    <main class="max-w-md mx-auto p-4">
        <h2 class="text-lg font-bold mb-4 text-gray-700">Nossos Lanches</h2>
        
        <!-- Div onde os produtos do banco serão carregados -->
        <div id="lista-produtos" class="space-y-4">
            <p class="text-center text-gray-400 py-10">Carregando cardápio...</p>
        </div>
    </main>

    <!-- Barra de Carrinho (só aparece se tiver algo) -->
    <div id="cart" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t flex justify-between items-center hidden shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <div>
            <p class="text-xs text-gray-400 font-bold uppercase">Total do Pedido</p>
            <p id="total-txt" class="text-xl font-black text-orange-600">R$ 0,00</p>
        </div>
        <button onclick="finalizarPedido()" class="bg-green-600 text-white px-8 py-3 rounded-full font-bold shadow-lg active:scale-95 transition-transform">
            Enviar Pedido
        </button>
    </div>

    <script>
        const storeId = 1;
        let total = 0;
        let itensPedidos = [];

        // 1. FUNÇÃO PARA BUSCAR PRODUTOS DO BANCO DE DADOS
        async function carregarCardapio() {
            try {
                const res = await fetch(`/api/products/${storeId}`);
                const produtos = await res.json();
                const container = document.getElementById('lista-produtos');

                if (produtos.length === 0) {
                    container.innerHTML = `<p class="text-center text-gray-400 py-10">Nenhum produto cadastrado no momento.</p>`;
                    return;
                }

                // Desenha os produtos na tela
                container.innerHTML = produtos.map(p => `
                    <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border border-gray-100">
                        <div>
                            <h3 class="font-bold text-gray-800">${p.name}</h3>
                            <span class="text-orange-600 font-bold">R$ ${p.price.toFixed(2)}</span>
                        </div>
                        <button onclick="addAoCarrinho('${p.name}', ${p.price})" class="bg-orange-100 text-orange-600 w-10 h-10 rounded-full font-bold text-xl flex items-center justify-center active:bg-orange-200">
                            +
                        </button>
                    </div>
                `).join('');

            } catch (error) {
                console.error("Erro ao carregar cardápio:", error);
            }
        }

        // 2. LÓGICA DO CARRINHO
        function addAoCarrinho(nome, preco) {
            total += preco;
            itensPedidos.push(nome);
            
            document.getElementById('total-txt').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('cart').classList.remove('hidden');
        }

        // 3. ENVIAR PEDIDO PARA O ADMIN (WEBSOCKET)
        async function finalizarPedido() {
            const nomeCliente = prompt("Qual o seu nome?");
            if (!nomeCliente) return;

            const pedido = {
                cliente: nomeCliente,
                total: total.toFixed(2),
                itens: itensPedidos.join(", ")
            };

            const res = await fetch(`/order/${storeId}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(pedido)
            });

            if (res.ok) {
                alert("🚀 Pedido enviado! Aguarde no local.");
                location.reload(); // Reseta o carrinho
            } else {
                alert("Erro ao enviar pedido.");
            }
        }

        // Inicia o carregamento ao abrir a página
        carregarCardapio();
    </script>
</body>
</html>
