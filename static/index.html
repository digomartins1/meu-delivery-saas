<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-20">
    <header class="bg-orange-600 text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">Lanchonete Digital</h1>
    </header>
    <main id="menu" class="p-4 max-w-md mx-auto space-y-4"></main>
    <div id="cart" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t hidden flex justify-between items-center shadow-2xl">
        <b id="tot" class="text-xl text-orange-600">R$ 0,00</b>
        <button onclick="send()" class="bg-green-600 text-white px-8 py-2 rounded-full font-bold">Pedir</button>
    </div>
    <script>
        const sId = 1; let total = 0; let itens = [];
        async function load(){
            const res = await fetch(`/api/products/${sId}`);
            const data = await res.json();
            document.getElementById('menu').innerHTML = data.map(p=>`
                <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center">
                    <div><h3 class="font-bold">${p.name}</h3><p class="text-orange-600 font-bold">R$ ${p.price.toFixed(2)}</p></div>
                    <button onclick="add('${p.name}', ${p.price})" class="bg-orange-100 text-orange-600 w-10 h-10 rounded-full font-bold text-xl">+</button>
                </div>`).join('');
        }
        function add(n,p){
            total+=p; itens.push(n);
            document.getElementById('tot').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('cart').classList.remove('hidden');
        }
        async function send(){
            const cli = prompt("Nome?"); if(!cli) return;
            await fetch(`/order/${sId}`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({cliente:cli, total:total.toFixed(2), itens:itens.join(", ")})
            });
            alert("Enviado!"); location.reload();
        }
        load();
    </script>
</body>
</html>
