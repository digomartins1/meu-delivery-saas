<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title><script src="https://cdn.tailwindcss.com"></script>
    <style>.view { display: none; } .view.active { display: block; }</style>
</head>
<body class="bg-gray-50 pb-28">
    <div id="btn-rastrear" onclick="toggleT('s')" class="hidden fixed top-4 right-4 bg-orange-600 text-white px-4 py-2 rounded-full shadow-2xl z-50 animate-pulse text-xs font-bold border-2 border-white">📍 RASTREAR</div>

    <div id="v-menu" class="view active">
        <header class="bg-orange-600 text-white p-8 text-center shadow-lg mb-6"><h1 class="text-3xl font-black italic italic">DELIVERY JOTTA</h1></header>
        <main id="menu" class="p-4 max-w-md mx-auto space-y-6"></main>
        <div id="cart" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t hidden flex justify-between items-center shadow-2xl rounded-t-3xl z-40">
            <b id="tot" class="text-2xl text-orange-600 font-black">R$ 0,00</b>
            <button onclick="enviar()" class="bg-green-600 text-white px-10 py-3 rounded-full font-black">PEDIR</button>
        </div>
    </div>

    <div id="v-status" class="view fixed inset-0 bg-white z-[60] flex flex-col items-center justify-center p-10 text-center">
        <div class="text-6xl mb-6 animate-bounce">🛵</div>
        <h2 class="text-2xl font-bold mb-6">Status do Pedido</h2>
        <div class="bg-orange-50 w-full p-8 rounded-3xl border-2 border-orange-100 mb-10">
            <p id="st-txt" class="text-3xl font-black text-orange-600 uppercase">Pendente</p>
        </div>
        <button onclick="toggleT('m')" class="text-gray-400 underline text-sm">Voltar ao Menu</button>
    </div>

    <script>
        const sId = 1; const WA = "5511999999999"; 
        let total = 0; let itens = [];
        async function load(){
            const res = await fetch(`/api/products/${sId}`);
            const data = await res.json();
            const cats = {};
            data.forEach(p=>{ if(!cats[p.category]) cats[p.category]=[]; cats[p.category].push(p); });
            let h = "";
            for(let c in cats){
                h += `<h2 class="text-orange-600 font-bold text-xs uppercase mb-3 mt-6 tracking-widest">${c}</h2>`;
                h += cats[c].map(p=>`
                <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center mb-3 border border-gray-100">
                    <img src="${p.image_url||'https://via.placeholder.com/100'}" class="w-14 h-14 rounded-xl object-cover mr-4">
                    <div class="flex-1"><h3 class="font-bold text-gray-800 text-sm">${p.name}</h3><p class="text-orange-600 font-bold text-sm">R$ ${p.price.toFixed(2)}</p></div>
                    <button onclick="add('${p.name}',${p.price})" class="bg-orange-600 text-white w-9 h-9 rounded-full font-bold shadow-lg">+</button>
                </div>`).join('');
            }
            document.getElementById('menu').innerHTML = h || '<p class="text-center py-20 text-gray-300">Vazio.</p>';
            checkP();
        }
        function add(n,p){ total+=p; itens.push(n); document.getElementById('tot').innerText=`R$ ${total.toFixed(2)}`; document.getElementById('cart').classList.remove('hidden'); }
        async function enviar(){
            const cli = prompt("Nome?"); if(!cli) return;
            const res = await fetch(`/order/${sId}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({cliente:cli, total:total.toFixed(2), itens:itens.join(", ")})});
            const d = await res.json(); localStorage.setItem('pid', d.order_id);
            window.open(`https://wa.me/${WA}?text=Pedido de ${cli}: ${itens.join(", ")}`);
            location.reload();
        }
        async function checkP(){
            const id = localStorage.getItem('pid'); if(!id) return;
            const res = await fetch(`/api/order-status/${id}`);
            const d = await res.json();
            if(res.ok && d.status !== 'Concluído'){
                document.getElementById('st-txt').innerText=d.status;
                document.getElementById('btn-rastrear').classList.remove('hidden');
                const ws = new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/${sId}`);
                ws.onmessage=(e)=>{ const m=JSON.parse(e.data); if(m.id==id){ document.getElementById('st-txt').innerText=m.status; if(m.status==='Concluído'){localStorage.removeItem('pid');location.reload();}}};
            }
        }
        function toggleT(v){ document.getElementById('v-menu').classList.toggle('active', v==='m'); document.getElementById('v-status').classList.toggle('active', v==='s'); }
        load();
    </script>
</body>
</html>
