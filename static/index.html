<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-28">
    <header class="bg-orange-600 text-white p-8 text-center"><h1 class="text-2xl font-black italic">DELIVERY JOTTA</h1></header>
    <main id="menu" class="p-4 max-w-md mx-auto"></main>
    <div id="cart" class="fixed bottom-0 left-0 right-0 bg-white p-4 border-t hidden flex justify-between items-center shadow-2xl">
        <b id="tot" class="text-2xl text-orange-600 font-black">R$ 0,00</b>
        <button onclick="send()" class="bg-green-600 text-white px-10 py-3 rounded-full font-black">PEDIR</button>
    </div>
    <script>
        const sId = 1; const WHATSAPP = "5582998095090"; // COLOQUE SEU NUMERO AQUI
        let total = 0; let itens = [];
        async function load(){
            const res = await fetch(`/api/products/${sId}`);
            const data = await res.json();
            const cats = {};
            data.forEach(p => { if(!cats[p.category]) cats[p.category]=[]; cats[p.category].push(p); });
            let h = "";
            for(let c in cats){
                h += `<h2 class="text-orange-600 font-bold mt-6 mb-2 uppercase text-sm tracking-widest">${c}</h2>`;
                h += cats[c].map(p=>`
                    <div class="bg-white p-3 rounded-xl shadow-sm flex items-center mb-3 border border-gray-100">
                        <img src="${p.image_url || 'https://via.placeholder.com/100'}" class="w-16 h-16 rounded-lg object-cover mr-4">
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800">${p.name}</h3>
                            <p class="text-orange-600 font-bold">R$ ${p.price.toFixed(2)}</p>
                        </div>
                        <button onclick="add('${p.name}', ${p.price})" class="bg-orange-600 text-white w-8 h-8 rounded-full font-bold">+</button>
                    </div>`).join('');
            }
            document.getElementById('menu').innerHTML = h;
        }
        function add(n,p){ total+=p; itens.push(n); document.getElementById('tot').innerText=`R$ ${total.toFixed(2)}`; document.getElementById('cart').classList.remove('hidden'); }
        async function send(){
            const cli = prompt("Seu nome?"); if(!cli) return;
            const msg = `*PEDIDO:* ${itens.join(", ")}\n*TOTAL:* R$ ${total.toFixed(2)}\n*CLIENTE:* ${cli}`;
            await fetch(`/order/${sId}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({cliente:cli, total:total.toFixed(2), itens:itens.join(", ")}) });
            window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`);
            location.reload();
        }
        load();
    </script>
</body>
</html>
