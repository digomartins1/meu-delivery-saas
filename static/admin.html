<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Pró</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <script>
        if(!localStorage.getItem('loja_id')) location.href='login.html';
        const storeId = localStorage.getItem('loja_id');
    </script>
    <div class="max-w-lg mx-auto">
        <header class="flex justify-between mb-6">
            <h1 class="font-bold text-orange-500 text-xl italic">PAINEL CONTROLE</h1>
            <button onclick="localStorage.clear();location.href='login.html'" class="text-xs bg-red-600 px-2 py-1 rounded">Sair</button>
        </header>
        <nav class="flex gap-2 mb-6">
            <button onclick="tab('ped')" class="flex-1 bg-orange-600 p-2 rounded font-bold">Pedidos</button>
            <button onclick="tab('pro')" class="flex-1 bg-slate-700 p-2 rounded font-bold">Produtos</button>
        </nav>

        <div id="aba-ped" class="space-y-4"></div>

        <div id="aba-pro" class="hidden">
            <div class="bg-slate-800 p-4 rounded mb-4 space-y-2">
                <input id="n" type="text" placeholder="Nome" class="w-full p-2 bg-slate-700 rounded">
                <input id="pr" type="number" placeholder="Preço" class="w-full p-2 bg-slate-700 rounded">
                <input id="img" type="text" placeholder="Link da Imagem (URL)" class="w-full p-2 bg-slate-700 rounded text-xs">
                <select id="cat" class="w-full p-2 bg-slate-700 rounded">
                    <option>Lanches</option><option>Bebidas</option><option>Doces</option>
                </select>
                <button onclick="addProd()" class="w-full bg-green-600 p-2 rounded font-bold">Salvar</button>
            </div>
            <div id="lista-p" class="space-y-2 text-sm text-slate-400"></div>
        </div>
    </div>
    <audio id="som" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>
    <script>
        function tab(t){
            document.getElementById('aba-ped').classList.toggle('hidden', t!=='ped');
            document.getElementById('aba-pro').classList.toggle('hidden', t!=='pro');
            if(t==='pro') loadP(); else loadOrders();
        }

        async function loadP(){
            const res = await fetch(`/api/products/${storeId}`);
            const data = await res.json();
            document.getElementById('lista-p').innerHTML = data.map(p=>`<div>${p.name} - R$ ${p.price}</div>`).join('');
        }

        async function addProd(){
            await fetch(`/api/products/${storeId}`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({name:n.value, price:parseFloat(pr.value), category:cat.value, image_url:img.value})
            });
            n.value=''; pr.value=''; img.value=''; loadP();
        }

        async function loadOrders(){
            const res = await fetch(`/api/orders/${storeId}`);
            const data = await res.json();
            document.getElementById('aba-ped').innerHTML = data.map(o=>cardPedido(o)).join('');
        }

        async function setStatus(id, st){
            await fetch(`/api/orders/${id}/status`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({status: st})
            });
            loadOrders();
        }

        function cardPedido(o){
            const cores = {"Pendente":"border-orange-500", "Preparando":"border-blue-500", "Entregue":"border-green-500"};
            return `
            <div class="bg-white text-black p-4 rounded-xl border-l-8 ${cores[o.status] || 'border-gray-500'}">
                <div class="flex justify-between font-bold"><span>${o.cliente}</span> <span>R$ ${o.total}</span></div>
                <p class="text-xs text-gray-500 mb-3">${o.itens}</p>
                <div class="flex gap-1">
                    <button onclick="setStatus(${o.id}, 'Preparando')" class="flex-1 bg-blue-100 text-blue-600 text-[10px] p-1 rounded font-bold">PREPARAR</button>
                    <button onclick="setStatus(${o.id}, 'Entregue')" class="flex-1 bg-green-100 text-green-600 text-[10px] p-1 rounded font-bold">ENTREGAR</button>
                </div>
            </div>`;
        }

        const ws = new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/${storeId}`);
        ws.onmessage=(e)=>{ som.play(); loadOrders(); };
        loadOrders();
        document.body.onclick=()=>som.play().then(()=>som.pause());
    </script>
</body>
</html>
