<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - WhatsApp Edition</title><script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <script>
        if(!localStorage.getItem('loja_id')) location.href='login.html';
        const storeId = localStorage.getItem('loja_id');
    </script>
    <div class="max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-6 text-sm">
            <span>Admin: <b id="user-display"></b></span>
            <button onclick="localStorage.clear();location.href='login.html'" class="bg-red-600 px-3 py-1 rounded">Sair</button>
        </div>
        <nav class="flex gap-2 mb-6">
            <button onclick="tab('ped')" class="flex-1 bg-orange-600 p-2 rounded font-bold">Pedidos</button>
            <button onclick="tab('pro')" class="flex-1 bg-slate-700 p-2 rounded font-bold">Produtos</button>
        </nav>
        <div id="aba-ped" class="space-y-4"></div>
        <div id="aba-pro" class="hidden">
            <div class="bg-slate-800 p-4 rounded mb-4 space-y-2">
                <input id="n" type="text" placeholder="Nome do Produto" class="w-full p-2 bg-slate-700 rounded outline-none">
                <input id="pr" type="number" placeholder="Preço" class="w-full p-2 bg-slate-700 rounded outline-none">
                <select id="cat" class="w-full p-2 bg-slate-700 rounded outline-none">
                    <option value="Lanches">Lanches</option>
                    <option value="Bebidas">Bebidas</option>
                    <option value="Acompanhamentos">Acompanhamentos</option>
                    <option value="Sobremesas">Sobremesas</option>
                </select>
                <button onclick="add()" class="w-full bg-green-600 p-2 rounded font-bold">Cadastrar Item</button>
            </div>
            <div id="lista-p" class="space-y-2"></div>
        </div>
    </div>
    <audio id="som" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>
    <script>
        document.getElementById('user-display').innerText = localStorage.getItem('user');
        function tab(t){
            document.getElementById('aba-ped').classList.toggle('hidden', t!=='ped');
            document.getElementById('aba-pro').classList.toggle('hidden', t!=='pro');
            if(t==='pro') loadP();
        }
        async function loadP(){
            const res = await fetch(`/api/products/${storeId}`);
            const data = await res.json();
            document.getElementById('lista-p').innerHTML = data.map(p=>`
                <div class="p-3 bg-slate-800 rounded border-l-4 border-orange-500 flex justify-between">
                    <div><span class="text-xs text-slate-400 block">${p.category}</span>${p.name}</div>
                    <b>R$ ${p.price.toFixed(2)}</b>
                </div>`).join('');
        }
        async function add(){
            await fetch(`/api/products/${storeId}`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({name:n.value, price:parseFloat(pr.value), category:cat.value})
            });
            n.value=''; pr.value=''; loadP();
        }
        const ws = new WebSocket(`${location.protocol==='https:'?'wss':'ws'}://${location.host}/ws/${storeId}`);
        ws.onmessage=(e)=>{
            const d = JSON.parse(e.data); som.play();
            document.getElementById('aba-ped').insertAdjacentHTML('afterbegin',`
                <div class="bg-white text-black p-4 rounded shadow-lg animate-bounce mb-2 border-l-8 border-green-500">
                    <div class="flex justify-between"><b>${d.cliente}</b> <span class="text-green-600 font-black">R$ ${d.total}</span></div>
                    <p class="text-sm mt-2">${d.itens}</p>
                </div>`);
        };
        document.body.onclick=()=>{som.play();som.pause();};
    </script>
</body>
</html>
